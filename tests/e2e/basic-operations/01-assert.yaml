apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_database WHERE datname='test-db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database test-db not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='test-db-group'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role test-db-group not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='test-db-reader'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role test-db-reader not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='test-db-writer'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role test-db-writer not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -d test-db -t -c "SELECT 1 FROM information_schema.schemata WHERE schema_name='stores'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Schema stores not found in test-db"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -d test-db -t -c "SELECT 1 FROM information_schema.schemata WHERE schema_name='customers'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Schema customers not found in test-db"
        exit 1
      fi
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: my-db
  finalizers:
    - finalizer.db.movetokube.com
status:
  roles:
    owner: test-db-group
    reader: test-db-reader
    writer: test-db-writer
  schemas:
    - stores
    - customers
  succeeded: true
