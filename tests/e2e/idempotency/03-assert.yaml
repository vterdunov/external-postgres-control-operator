apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      # Idempotency: database must still exist after re-apply
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT 1 FROM pg_database WHERE datname='idem-test-db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database idem-test-db not found after re-apply"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      # Idempotency: owner group role must still exist after re-apply
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT 1 FROM pg_roles WHERE rolname='idem-test-group'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role idem-test-group not found after re-apply"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      # Idempotency: user role must still be member of group after re-apply
      ROLE=$(kubectl get secret idem-secret -n "$NAMESPACE" \
        -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT pg_has_role('$ROLE','idem-test-group','MEMBER')")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "t" ]; then
        echo "Role $ROLE lost membership of idem-test-group after re-apply"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      # Verify Secret still exists and ROLE is not empty (not regenerated to empty)
      ROLE=$(kubectl get secret idem-secret -n "$NAMESPACE" \
        -o jsonpath='{.data.ROLE}' | base64 -d)
      if [ -z "$ROLE" ]; then
        echo "ERROR: Secret idem-secret ROLE is empty after re-apply"
        exit 1
      fi
      echo "OK: Secret idem-secret ROLE is non-empty after re-apply: $ROLE"
  - script: |
      #!/bin/bash
      set -e
      # Verify no error events on the CRs after re-apply
      ERRORS=$(kubectl get events -n "$NAMESPACE" \
        --field-selector reason=Error,involvedObject.name=idem-db 2>/dev/null | \
        grep -v "^LAST\|^$" | wc -l)
      if [ "$ERRORS" -gt 0 ]; then
        echo "ERROR: Found error events for idem-db after re-apply"
        kubectl get events -n "$NAMESPACE" --field-selector involvedObject.name=idem-db
        exit 1
      fi
      echo "OK: No error events for idem-db after re-apply"
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: idem-db
status:
  roles:
    owner: idem-test-group
  succeeded: true
---
apiVersion: db.movetokube.com/v1alpha1
kind: PostgresUser
metadata:
  name: idem-db-user
status:
  postgresGroup: idem-test-group
  succeeded: true
---
apiVersion: v1
kind: Secret
metadata:
  name: idem-secret
