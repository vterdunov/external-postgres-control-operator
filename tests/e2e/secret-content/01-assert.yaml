---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- \
        psql -U postgres -t -c \
        "SELECT 1 FROM pg_database WHERE datname='sec-test-db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database sec-test-db not found"
        exit 1
      fi
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: sec-db
status:
  roles:
    owner: sec-test-group
    reader: sec-test-db-reader
    writer: sec-test-db-writer
  succeeded: true
