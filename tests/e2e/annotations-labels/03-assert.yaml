---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - command: bash -c "! kubectl get postgresuser ann-db-user -n $NAMESPACE"
  - command: bash -c "! kubectl get postgres ann-db -n $NAMESPACE"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres         psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT count(*) FROM pg_database WHERE datname='ann-test-db'")
      COUNT=$(echo "$result" | tr -d '[:space:]')
      if [ "$COUNT" -ne 0 ]; then
        echo "Database ann-test-db still exists but should be dropped"
        exit 1
      fi
      echo "OK: Database ann-test-db dropped"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres         psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT count(*) FROM pg_roles WHERE rolname LIKE 'annuser%'")
      COUNT=$(echo "$result" | tr -d '[:space:]')
      if [ "$COUNT" -ne 0 ]; then
        echo "User role(s) still exist but should be dropped"
        exit 1
      fi
      echo "OK: User role(s) dropped"
