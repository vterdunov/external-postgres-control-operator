---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      ROLE=$(kubectl get secret min-secret -n "$NAMESPACE" \
        -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres         psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT 1 FROM pg_roles WHERE rolname='$ROLE'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "User role $ROLE not found in pg_roles"
        exit 1
      fi
      echo "User role $ROLE verified in pg_roles"
  - script: |
      #!/bin/bash
      set -e
      ROLE=$(kubectl get secret min-secret -n "$NAMESPACE" \
        -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres         psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT pg_has_role('$ROLE', 'min-test-db-group', 'member')")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "t" ]; then
        echo "User $ROLE is not a member of min-test-db-group"
        exit 1
      fi
      echo "User $ROLE is a member of min-test-db-group"
---
apiVersion: db.movetokube.com/v1alpha1
kind: PostgresUser
metadata:
  name: min-db-user
status:
  databaseName: min-test-db
  postgresGroup: min-test-db-group
  succeeded: true
---
apiVersion: v1
kind: Secret
metadata:
  name: min-secret
