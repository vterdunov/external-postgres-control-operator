apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - command: bash -c "! kubectl get postgres multi-db -n $NAMESPACE"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c "SELECT COUNT(*) FROM pg_database WHERE datname='multi-test-db'")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "0" ]; then
        echo "Database multi-test-db still exists but should be dropped"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      for role in multi-test-group multi-test-db-reader multi-test-db-writer; do
        count=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c "SELECT COUNT(*) FROM pg_roles WHERE rolname='$role'")
        if [ "$(echo "$count" | tr -d '[:space:]')" != "0" ]; then
          echo "Role $role still exists but should be dropped"
          exit 1
        fi
      done
