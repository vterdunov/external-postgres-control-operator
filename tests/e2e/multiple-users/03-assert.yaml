apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - command: bash -c "! kubectl get postgresuser multi-owner -n $NAMESPACE"
  - command: bash -c "! kubectl get postgresuser multi-writer -n $NAMESPACE"
  - command: bash -c "! kubectl get postgresuser multi-reader -n $NAMESPACE"
  - script: |
      #!/bin/bash
      set -e
      for prefix in mowner mwriter mreader; do
        count=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT COUNT(*) FROM pg_roles WHERE rolname LIKE '${prefix}%'")
        if [ "$(echo "$count" | tr -d '[:space:]')" != "0" ]; then
          echo "Role with prefix ${prefix} still exists but should be dropped"
          exit 1
        fi
      done
