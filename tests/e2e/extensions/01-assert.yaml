apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c "SELECT 1 FROM pg_database WHERE datname='ext-test-db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database ext-test-db not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -d ext-test-db -t -c "SELECT 1 FROM pg_extension WHERE extname='pgcrypto'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Extension pgcrypto not installed in ext-test-db"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -d ext-test-db -t -c "SELECT 1 FROM pg_extension WHERE extname='fuzzystrmatch'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Extension fuzzystrmatch not installed in ext-test-db"
        exit 1
      fi
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: ext-db
status:
  roles:
    owner: ext-test-db-group
    reader: ext-test-db-reader
    writer: ext-test-db-writer
  succeeded: true
