apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - command: bash -c "! kubectl get postgresuser nodrop-db-user -n $NAMESPACE"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT count(*) FROM pg_roles WHERE rolname LIKE 'nodropuser%'")
      COUNT=$(echo "$result" | tr -d '[:space:]')
      if [ "$COUNT" -eq 0 ]; then
        echo "ERROR: User role should still exist (dropOnDelete=false) but was dropped"
        exit 1
      fi
      echo "OK: User role persists as expected"
  - script: |
      #!/bin/bash
      set -e
      kubectl get secret nodrop-secret -n "$NAMESPACE" || (echo "ERROR: Secret was deleted but should persist (no ownerReference)" && exit 1)
      echo "OK: Secret nodrop-secret still exists"
---
apiVersion: v1
kind: Secret
metadata:
  name: nodrop-secret
