apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      ROLE=$(kubectl get secret nodrop-secret -n "$NAMESPACE" -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='$ROLE'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role $ROLE not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      ROLE=$(kubectl get secret nodrop-secret -n "$NAMESPACE" -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT pg_has_role('$ROLE','nodrop-test-group','MEMBER')")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "t" ]; then
        echo "Role $ROLE not member of nodrop-test-group"
        exit 1
      fi
---
apiVersion: db.movetokube.com/v1alpha1
kind: PostgresUser
metadata:
  name: nodrop-db-user
status:
  postgresGroup: nodrop-test-group
  succeeded: true
---
apiVersion: v1
kind: Secret
metadata:
  name: nodrop-secret
