apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      #!/bin/bash
      set -e
      # Terminate connections and drop database
      kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c \
        "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='nodrop-test-db'"
      kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c \
        "DROP DATABASE IF EXISTS \"nodrop-test-db\""
      # Drop user role(s) with LIKE pattern
      ROLES=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c \
        "SELECT rolname FROM pg_roles WHERE rolname LIKE 'nodropuser%'")
      for ROLE in $ROLES; do
        kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c \
          "DROP ROLE IF EXISTS \"$ROLE\""
      done
      # Drop group roles
      kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c \
        "DROP ROLE IF EXISTS \"nodrop-test-group\""
      kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c \
        "DROP ROLE IF EXISTS \"nodrop-test-db-reader\""
      kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c \
        "DROP ROLE IF EXISTS \"nodrop-test-db-writer\""
      # Also delete the Secret manually (no ownerReference cascade)
      kubectl delete secret nodrop-secret -n "$NAMESPACE" --ignore-not-found
      echo "Manual cleanup complete"
