apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c "SELECT 1 FROM pg_database WHERE datname='clean-test-db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database clean-test-db not found"
        exit 1
      fi
      echo "OK: Database clean-test-db exists"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -d clean-test-db -t -c "SELECT count(*) FROM pg_extension WHERE extname='pgcrypto'")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "1" ]; then
        echo "Extension pgcrypto not found in clean-test-db"
        exit 1
      fi
      echo "OK: Extension pgcrypto exists in clean-test-db"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c \
        "SELECT 1 FROM pg_roles WHERE rolname='clean-test-group'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Owner role clean-test-group not found"
        exit 1
      fi
      echo "OK: Owner role clean-test-group exists"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c \
        "SELECT 1 FROM pg_roles WHERE rolname='clean-test-db-reader'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Reader role clean-test-db-reader not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c \
        "SELECT 1 FROM pg_roles WHERE rolname='clean-test-db-writer'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Writer role clean-test-db-writer not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -d clean-test-db -t -c \
        "SELECT 1 FROM information_schema.schemata WHERE schema_name='cleanschema'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Schema cleanschema not found in clean-test-db"
        exit 1
      fi
      echo "OK: Schema cleanschema exists"
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: clean-db
status:
  roles:
    owner: clean-test-group
  succeeded: true
