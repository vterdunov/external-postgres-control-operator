apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_database WHERE datname='clean-test-db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database clean-test-db not found"
        exit 1
      fi
      echo "OK: Database clean-test-db exists"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -d clean-test-db -t -c "SELECT count(*) FROM pg_extension WHERE extname='pgcrypto'")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "1" ]; then
        echo "Extension pgcrypto not found in clean-test-db"
        exit 1
      fi
      echo "OK: Extension pgcrypto exists in clean-test-db"
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: clean-db
status:
  roles:
    owner: clean-test-group
  succeeded: true
