apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - command: bash -c "! kubectl get postgresuser upd-db-user -n $NAMESPACE"
  - command: bash -c "! kubectl get postgres upd-db -n $NAMESPACE"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT count(*) FROM pg_database WHERE datname='upd-test-db'")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "0" ]; then
        echo "Database upd-test-db still exists"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT count(*) FROM pg_roles WHERE rolname LIKE 'upduser%'")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "0" ]; then
        echo "Role(s) with prefix upduser still exist"
        exit 1
      fi
