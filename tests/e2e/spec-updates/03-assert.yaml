apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      ROLE=$(kubectl get secret upd-secret -n "$NAMESPACE" -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c "SELECT pg_has_role('$ROLE','upd-test-db-reader','MEMBER')")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "t" ]; then
        echo "Role $ROLE is not member of upd-test-db-reader"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      ROLE=$(kubectl get secret upd-secret -n "$NAMESPACE" -o jsonpath='{.data.ROLE}' | base64 -d)
      result=$(kubectl exec postgresql-0 -n default -- psql -U postgres -t -c "SELECT pg_has_role('$ROLE','upd-test-db-writer','MEMBER')")
      if [ "$(echo "$result" | tr -d '[:space:]')" != "f" ]; then
        echo "Role $ROLE is still member of upd-test-db-writer"
        exit 1
      fi
---
apiVersion: db.movetokube.com/v1alpha1
kind: PostgresUser
metadata:
  name: upd-db-user
status:
  succeeded: true
  postgresGroup: upd-test-db-reader
