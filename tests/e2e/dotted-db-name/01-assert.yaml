apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT 1 FROM pg_database WHERE datname='my.test.db'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database my.test.db not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='my.test.db-group'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role my.test.db-group not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='my.test.db-reader'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role my.test.db-reader not found"
        exit 1
      fi
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n default -- env PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -t -c "SELECT 1 FROM pg_roles WHERE rolname='my.test.db-writer'")
      if [ -z "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Role my.test.db-writer not found"
        exit 1
      fi
---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: dotted-db
  finalizers:
    - finalizer.db.movetokube.com
status:
  roles:
    owner: my.test.db-group
    reader: my.test.db-reader
    writer: my.test.db-writer
  succeeded: true
