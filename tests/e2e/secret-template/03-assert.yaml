apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    selector: app.kubernetes.io/name=ext-postgres-operator
    tail: 100
commands:
  - command: bash -c "! kubectl get postgresuser tmpl-db-user -n $NAMESPACE"
  - command: bash -c "! kubectl get postgres tmpl-db -n $NAMESPACE"
  - script: |
      #!/bin/bash
      set -e
      result=$(kubectl exec postgresql-0 -n "$NAMESPACE" -- psql -U postgres -t -c "SELECT 1 FROM pg_database WHERE datname='tmpl-test-db'")
      if [ -n "$(echo "$result" | tr -d '[:space:]')" ]; then
        echo "Database tmpl-test-db still exists but should be dropped"
        exit 1
      fi
